services:
  - type: web
    name: anime-oscilloscope-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install .
    startCommand: uvicorn anime_oscilloscope.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_CORS_ORIGINS
        value: https://xifanzz.github.io
      - key: APP_DATABASE_URL
        sync: false
      - key: APP_REPOSITORY_BACKEND
        value: postgres
      - key: APP_BANGUMI_TOKEN
        sync: false
      - key: APP_MAL_CLIENT_ID
        sync: false
      - key: APP_SEMANTIC_BACKEND
        value: hash

name: Seasonal catalog backfill

on:
  workflow_dispatch:
    inputs:
      year:
        description: Target year, for example 2026
        required: true
      quarter:
        description: "Target quarter: 1, 2, 3, or 4"
        required: true
      limit:
        description: Subjects per Bangumi page
        required: false
        default: "100"
      start_offset:
        description: Manual starting offset for resuming a large season
        required: false
        default: "0"
      max_pages:
        description: Maximum Bangumi pages to process in this run
        required: false
        default: "10"

concurrency:
  group: seasonal-catalog-backfill-${{ inputs.year }}-${{ inputs.quarter }}
  cancel-in-progress: false

jobs:
  backfill:
    if: ${{ vars.LIVE_SYNC_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      APP_ENV: production
      APP_REPOSITORY_BACKEND: postgres
      APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
      APP_BANGUMI_TOKEN: ${{ secrets.APP_BANGUMI_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install ./apps/api
      - name: Validate database secret
        shell: bash
        run: test -n "$APP_DATABASE_URL" || { echo "APP_DATABASE_URL is missing"; exit 1; }
      - name: Backfill selected season
        shell: bash
        run: |
          python -m anime_oscilloscope.jobs.backfill_season \
            --year "${{ inputs.year }}" \
            --quarter "${{ inputs.quarter }}" \
            --limit "${{ inputs.limit || '100' }}" \
            --start-offset "${{ inputs.start_offset || '0' }}" \
            --max-pages "${{ inputs.max_pages || '10' }}"

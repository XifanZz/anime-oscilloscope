name: Historical catalog backfill

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: Maximum Bangumi pages to process in this run
        required: false
        default: "10"
      page_size:
        description: Subjects per Bangumi page
        required: false
        default: "100"
      start_year:
        description: First animation year (used when initializing or resetting)
        required: false
        default: "1917"
      reset:
        description: Reset the durable cursor and restart from start_year
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "37 */6 * * *"

concurrency:
  group: historical-catalog-backfill
  cancel-in-progress: false

jobs:
  backfill:
    if: ${{ vars.HISTORY_BACKFILL_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      APP_ENV: production
      APP_REPOSITORY_BACKEND: postgres
      APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
      APP_BANGUMI_TOKEN: ${{ secrets.APP_BANGUMI_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install ./apps/api
      - name: Validate database secret
        shell: bash
        run: test -n "$APP_DATABASE_URL" || { echo "APP_DATABASE_URL is missing"; exit 1; }
      - name: Ensure backfill state schema
        run: python -m anime_oscilloscope.jobs.apply_migration database/migrations/005_catalog_backfill.sql
      - name: Resume historical catalog backfill
        shell: bash
        run: |
          ARGS=(
            --start-year "${{ inputs.start_year || '1917' }}"
            --end-year "$(date -u +%Y)"
            --page-size "${{ inputs.page_size || '100' }}"
            --max-pages "${{ inputs.max_pages || '10' }}"
          )
          if [[ "${{ inputs.reset || 'false' }}" == "true" ]]; then
            ARGS+=(--reset)
          fi
          python -m anime_oscilloscope.jobs.backfill_catalog "${ARGS[@]}"

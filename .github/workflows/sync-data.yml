name: Live data sync

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Maximum seasonal subjects in this run
        required: false
        default: "20"
      offset:
        description: Manual discovery offset (scheduled runs rotate automatically)
        required: false
        default: "0"
      year:
        description: Optional target year for manual seasonal sync
        required: false
        default: ""
      quarter:
        description: "Optional target quarter for manual seasonal sync: 1, 2, 3, or 4"
        required: false
        default: ""
  schedule:
    - cron: "17 19 * * *"

concurrency:
  group: live-data-sync
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ vars.LIVE_SYNC_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      APP_ENV: production
      APP_REPOSITORY_BACKEND: postgres
      APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL }}
      APP_BANGUMI_TOKEN: ${{ secrets.APP_BANGUMI_TOKEN }}
      APP_MAL_CLIENT_ID: ${{ secrets.APP_MAL_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: python -m pip install ./apps/api
      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$APP_DATABASE_URL" || { echo "APP_DATABASE_URL is missing"; exit 1; }
          test -n "$APP_MAL_CLIENT_ID" || { echo "APP_MAL_CLIENT_ID is missing"; exit 1; }
      - name: Synchronize selected season
        shell: bash
        run: |
          LIMIT="${{ inputs.limit || '20' }}"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            DAY_OF_YEAR=$(date -u +%j)
            OFFSET=$(( (10#$DAY_OF_YEAR % 7) * LIMIT ))
            YEAR_ARGS=()
          else
            OFFSET="${{ inputs.offset || '0' }}"
            YEAR_ARGS=()
            if [[ -n "${{ inputs.year }}" ]]; then
              YEAR_ARGS+=(--year "${{ inputs.year }}")
            fi
            if [[ -n "${{ inputs.quarter }}" ]]; then
              YEAR_ARGS+=(--quarter "${{ inputs.quarter }}")
            fi
          fi
          python -m anime_oscilloscope.jobs.sync_catalog "${YEAR_ARGS[@]}" --limit "$LIMIT" --offset "$OFFSET"
